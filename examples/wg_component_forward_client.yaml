buffer_size: 2048
queue_size: 10240
worker_count: 4
services:
  - type: wg
    tag: wg_client
    interface_name: wg0
    mtu: 1420
    addresses:
      - 10.6.0.2/24
    private_key: YOUR_CLIENT_PRIVATE_KEY_HEX
    listen_port: 51820
    detour: [line_a, line_b]
    peers:
      - public_key: YOUR_SERVER_PUBLIC_KEY_HEX
        endpoint: udplex-server:51820
        allowed_ips:
          - 10.6.0.1/32
        persistent_keepalive: 25

  - type: forward
    tag: line_a
    forwarders:
      - SERVER_IP:9000
    detour: [wg_client]
    reconnect_interval: 5
    connection_check_time: 10
    send_keepalive: false
    auth:
      enabled: true
      secret: CHANGE_ME_SHARED_SECRET
      enable_encryption: false

  - type: forward
    tag: line_b
    forwarders:
      - SERVER_IP:9001
    detour: [wg_client]
    reconnect_interval: 5
    connection_check_time: 10
    send_keepalive: false
    auth:
      enabled: true
      secret: CHANGE_ME_SHARED_SECRET
      enable_encryption: false
