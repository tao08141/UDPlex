buffer_size: 2048
queue_size: 10240
worker_count: 4
services:
  - type: wg
    tag: wg_client
    interface_name: wg0
    mtu: 1420
    addresses:
      - 10.7.0.2/24
    private_key: YOUR_CLIENT_PRIVATE_KEY_HEX
    listen_port: 51820
    detour: [tcp_client]
    peers:
      - public_key: YOUR_SERVER_PUBLIC_KEY_HEX
        endpoint: udplex-server:51820
        allowed_ips:
          - 10.7.0.1/32
        persistent_keepalive: 25

  - type: tcp_tunnel_forward
    tag: tcp_client
    forwarders:
      - SERVER_IP:9000:2
    broadcast_mode: false
    detour: [wg_client]
    connection_check_time: 10
    auth:
      enabled: true
      secret: CHANGE_ME_SHARED_SECRET
      enable_encryption: false
