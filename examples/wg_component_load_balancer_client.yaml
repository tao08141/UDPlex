buffer_size: 2048
queue_size: 10240
worker_count: 4
logging:
  level: debug
  format: console
  output_path: stdout
services:
  - type: wg
    tag: wg_client
    interface_name: wgtestc0
    mtu: 1420
    addresses:
      - 10.66.0.2/24
    private_key: 787bec983d533e31e64a71c5c079006860cd9e2c6a93b6da69ab4465e8d58179
    listen_port: 51820
    reuse_incoming_detour: false
    detour: [load_balancer]
    peers:
      - public_key: 4e126dd08dc1e79c7417e71198861dd57694d68f34cbb6a8b3777697e9c3654c
        endpoint: udplex-server:51820
        allowed_ips:
          - 10.66.0.1/32
        persistent_keepalive: 1

  - type: forward
    tag: redundant_forward1
    forwarders:
      - SERVER_IP:5900
    reconnect_interval: 1
    connection_check_time: 2
    send_keepalive: false
    detour: [wg_client]
    auth:
      enabled: true
      secret: integration-wg-secret
      enable_encryption: false

  - type: forward
    tag: redundant_forward2
    forwarders:
      - SERVER_IP:5901
    reconnect_interval: 1
    connection_check_time: 2
    send_keepalive: false
    detour: [wg_client]
    auth:
      enabled: true
      secret: integration-wg-secret
      enable_encryption: false

  - type: load_balancer
    tag: load_balancer
    window_size: 3
    detour:
      - rule: "bps <= 50000000 || !available_redundant_forward1 || !available_redundant_forward2"
        targets: [redundant_forward1, redundant_forward2]
      - rule: "(bps > 50000000) && (seq % 2 == 0) && available_redundant_forward1 && available_redundant_forward2"
        targets: [redundant_forward1]
      - rule: "(bps > 50000000) && (seq % 2 == 1) && available_redundant_forward2 && available_redundant_forward1"
        targets: [redundant_forward2]
api:
  enabled: true
  port: 8080
  host: 0.0.0.0
  h5_files_path: ./h5
