name: nightly-build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Commit SHA, tag, or branch to test. Leave empty to use the triggering commit.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  packages: write
  # issues: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_ref || github.sha }}
          
      - run: git fetch --force --tags

      - name: Resolve target commit metadata
        id: target
        shell: bash
        run: |
          requested_ref="${{ github.event.inputs.target_ref }}"
          resolved_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short HEAD)"

          if [ -n "$requested_ref" ]; then
            ref_name="$requested_ref"
            run_mode="historical"
          else
            ref_name="${GITHUB_REF_NAME}"
            run_mode="nightly"
          fi

          echo "requested_ref=$ref_name" >> "$GITHUB_OUTPUT"
          echo "sha=$resolved_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "run_mode=$run_mode" >> "$GITHUB_OUTPUT"

      - name: Show target commit
        shell: bash
        run: |
          echo "Running mode: ${{ steps.target.outputs.run_mode }}"
          echo "Requested ref: ${{ steps.target.outputs.requested_ref }}"
          echo "Resolved SHA: ${{ steps.target.outputs.sha }}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Unit Tests
        env:
          GITHUB_SHA: ${{ steps.target.outputs.sha }}
          GITHUB_REF_NAME: ${{ steps.target.outputs.ref_name }}
        run: |
          echo "Running unit tests..."
          cd src
          go test ./...

      - name: Run Integration Tests
        env:
          GITHUB_SHA: ${{ steps.target.outputs.sha }}
          GITHUB_REF_NAME: ${{ steps.target.outputs.ref_name }}
        run: |
          echo "Running integration tests..."
          cd tests/integration
          chmod +x run_integration_tests.sh
          sudo env "PATH=$PATH" bash ./run_integration_tests.sh -suite all
      
      - name: Push metrics to dedicated branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_COMMIT_SHA: ${{ steps.target.outputs.sha }}
          TARGET_REF_NAME: ${{ steps.target.outputs.ref_name }}
        shell: bash
        run: |
          echo "Publishing metrics to 'metrics' branch..."
          if [ ! -d metrics ]; then
            echo "No metrics directory found; skipping publish."
            exit 0
          fi

          REPO="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}.git"
          AUTH_REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          CLONE_DIR=$(mktemp -d)
          echo "Cloning metrics branch into temp dir..."
          git clone --no-checkout "$AUTH_REPO" "$CLONE_DIR"
          cd "$CLONE_DIR"
          if git ls-remote --exit-code origin metrics >/dev/null 2>&1; then
            git checkout -B metrics origin/metrics
          else
            git checkout --orphan metrics
          fi
          # Clean non-metrics files only; preserve existing metrics history
          # find . -mindepth 1 -maxdepth 1 ! -name .git ! -name metrics -exec rm -rf {} +
          mkdir -p metrics
          cp -r "$GITHUB_WORKSPACE/metrics/." metrics/ || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage both new metrics content and deletions of any other files
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore(metrics): update for ${TARGET_COMMIT_SHA} (ref ${TARGET_REF_NAME}, run ${GITHUB_RUN_ID})"
            git push --set-upstream origin metrics
            echo "Metrics pushed to 'metrics' branch."
          else
            echo "No metrics changes to commit."
          fi
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build date
        id: build_date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.target.outputs.run_mode }}-${{ steps.build_date.outputs.date }}-${{ steps.target.outputs.short_sha }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          # GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: UDPlex-${{ steps.target.outputs.run_mode }}-${{ steps.target.outputs.short_sha }}
          path: dist/*

      - name: Push Docker images
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/udplex:dev
